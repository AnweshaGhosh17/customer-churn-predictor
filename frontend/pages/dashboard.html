<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — ChurnGuard</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
    canvas { max-height: 260px; }
    .driver-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .driver-label { flex: 0 0 170px; }
    .driver-bar-wrap {
      flex: 1; height: 8px;
      background: var(--surface2);
      border-radius: 4px; overflow: hidden;
    }
    .driver-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.8s ease;
    }
    .driver-pct { flex: 0 0 40px; text-align: right; color: var(--muted); font-size: 0.82rem; }
    .risk-dot {
      width: 10px; height: 10px;
      border-radius: 50%; display: inline-block;
      margin-right: 6px; flex-shrink: 0;
    }
    .dot-high   { background: var(--red);   }
    .dot-medium { background: var(--amber); }
    .dot-low    { background: var(--green); }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">⚡ ChurnGuard</a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="predict.html">Predict</a>
      <a href="simulator.html">Simulator</a>
      <a href="dashboard.html" class="active">Dashboard</a>
    </div>
  </div>
</nav>

<div class="container page">

  <h1>Risk Dashboard</h1>
  <p class="subtitle">Overview of churn risk distribution, top drivers, and customer risk rankings.</p>

  <!-- KPI stat cards -->
  <div class="stat-grid" id="kpiCards">
    <div class="card" style="text-align:center;padding:20px;">
      <div class="spinner" style="margin:0 auto;"></div>
    </div>
  </div>

  <!-- Charts row -->
  <div class="charts-row">
    <div class="card">
      <h3>Risk Distribution</h3>
      <canvas id="donutChart"></canvas>
    </div>
    <div class="card">
      <h3>Top Churn Drivers</h3>
      <div id="driversChart" style="margin-top:8px;"></div>
    </div>
  </div>

  <!-- Customer table -->
  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
      <h3 style="margin:0;">Customer Risk Table</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-ghost" style="padding:6px 14px; font-size:0.85rem;" onclick="filterTable('ALL')">All</button>
        <button class="btn btn-ghost" style="padding:6px 14px; font-size:0.85rem; color:var(--red);" onclick="filterTable('HIGH')">High Risk</button>
        <button class="btn btn-ghost" style="padding:6px 14px; font-size:0.85rem; color:var(--amber);" onclick="filterTable('MEDIUM')">Medium</button>
        <button class="btn btn-ghost" style="padding:6px 14px; font-size:0.85rem; color:var(--green);" onclick="filterTable('LOW')">Low Risk</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table id="customerTable">
        <thead>
          <tr>
            <th>Customer ID</th>
            <th>Tenure (mo.)</th>
            <th>Monthly ($)</th>
            <th>Contract</th>
            <th>Churn Prob.</th>
            <th>Risk</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" style="text-align:center; color:var(--muted); padding:24px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const API_BASE = window.location.hostname === "localhost"
    ? "http://localhost:8000"
    : "";

  const CONTRACT_LABELS = ["Month-to-month", "One year", "Two year"];
  let allCustomers = [];
  let donutChart   = null;

  async function loadDashboard() {
    try {
      const [statsRes, custsRes] = await Promise.all([
        fetch(`${API_BASE}/api/dashboard`),
        fetch(`${API_BASE}/api/dashboard/customers`),
      ]);
      const stats   = await statsRes.json();
      const customers = await custsRes.json();
      allCustomers  = customers;

      renderKPIs(stats);
      renderDonut(stats);
      renderDrivers(stats.top_churn_drivers);
      renderTable(customers);
    } catch (err) {
      document.getElementById("kpiCards").innerHTML =
        `<div class="card" style="color:var(--red); padding:20px;">
          API error: ${err.message}. Make sure the API is running.
        </div>`;
    }
  }

  function renderKPIs(stats) {
    const avgPct = Math.round(stats.avg_probability * 100);
    document.getElementById("kpiCards").innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${stats.total_customers}</div>
        <div class="stat-label">Total Customers</div>
      </div>
      <div class="stat-card stat-high">
        <div class="stat-value">${stats.high_risk_count}</div>
        <div class="stat-label">High Risk</div>
      </div>
      <div class="stat-card stat-medium">
        <div class="stat-value">${stats.medium_risk_count}</div>
        <div class="stat-label">Medium Risk</div>
      </div>
      <div class="stat-card stat-low">
        <div class="stat-value">${stats.low_risk_count}</div>
        <div class="stat-label">Low Risk</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${avgPct}%</div>
        <div class="stat-label">Avg. Churn Probability</div>
      </div>`;
  }

  function renderDonut(stats) {
    const ctx = document.getElementById("donutChart").getContext("2d");
    if (donutChart) donutChart.destroy();
    donutChart = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: ["High Risk", "Medium Risk", "Low Risk"],
        datasets: [{
          data: [stats.high_risk_count, stats.medium_risk_count, stats.low_risk_count],
          backgroundColor: ["rgba(248,113,113,0.85)", "rgba(251,191,36,0.85)", "rgba(52,211,153,0.85)"],
          borderColor: ["#f87171", "#fbbf24", "#34d399"],
          borderWidth: 2,
          hoverOffset: 8,
        }],
      },
      options: {
        cutout: "65%",
        plugins: {
          legend: {
            position: "bottom",
            labels: { color: "#8b90b5", font: { size: 12 }, padding: 16 },
          },
        },
        animation: { animateScale: true },
      },
    });
  }

  function renderDrivers(drivers) {
    const max = drivers[0].importance;
    document.getElementById("driversChart").innerHTML = drivers.map(d => `
      <div class="driver-row">
        <div class="driver-label">${d.feature}</div>
        <div class="driver-bar-wrap">
          <div class="driver-bar" style="width:${(d.importance / max * 100).toFixed(1)}%"></div>
        </div>
        <div class="driver-pct">${(d.importance * 100).toFixed(0)}%</div>
      </div>`).join("");
  }

  function renderTable(customers) {
    const riskColors = { HIGH: "var(--red)", MEDIUM: "var(--amber)", LOW: "var(--green)" };
    const dotClass   = { HIGH: "dot-high",   MEDIUM: "dot-medium",   LOW: "dot-low"   };

    document.getElementById("tableBody").innerHTML = customers.map(c => `
      <tr>
        <td><code style="color:var(--accent2)">${c.id}</code></td>
        <td>${c.tenure}</td>
        <td>$${c.monthly_charges.toFixed(2)}</td>
        <td>${CONTRACT_LABELS[c.contract] || "—"}</td>
        <td>
          <div style="display:flex; align-items:center; gap:8px;">
            <div style="flex:1; height:6px; background:var(--surface2); border-radius:3px;">
              <div style="width:${Math.round(c.probability*100)}%; height:100%; background:${riskColors[c.risk]}; border-radius:3px;"></div>
            </div>
            <span style="min-width:36px; color:${riskColors[c.risk]}; font-weight:600;">
              ${Math.round(c.probability * 100)}%
            </span>
          </div>
        </td>
        <td>
          <span class="risk-dot ${dotClass[c.risk]}"></span>
          <span style="color:${riskColors[c.risk]}; font-weight:600;">${c.risk}</span>
        </td>
      </tr>`).join("");
  }

  function filterTable(level) {
    const filtered = level === "ALL"
      ? allCustomers
      : allCustomers.filter(c => c.risk === level);
    renderTable(filtered);
  }

  loadDashboard();
</script>
</body>
</html>
